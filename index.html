<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spank Master</title>
    <style>
        body {
            background: #000;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background 0.1s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #toggleBtn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 2px solid #333;
            background: transparent;
            color: #555;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #toggleBtn.active {
            border-color: #ff0055;
            color: #ff0055;
            box-shadow: 0 0 40px rgba(255, 0, 85, 0.3);
            transform: scale(1.05);
        }
        .flash { background: #440011 !important; }
    </style>
</head>
<body>

    <button id="toggleBtn">ВКЛЮЧИТЬ</button>

    <script>
        const btn = document.getElementById('toggleBtn');
        let isEnabled = false;
        let lastHit = 0;

        const CONFIG = {
            totalFiles: 60,
            path: 'audio/sexy/',
            threshold: 12, // Пониженный порог (более чувствительный)
            cooldown: 250  // Минимальная пауза между звуками
        };

        btn.addEventListener('click', () => {
            isEnabled = !isEnabled;
            
            // "Прогрев" аудио-движка (нужно для политик браузера)
            const unlock = new Audio();
            unlock.play().catch(() => {});

            if (isEnabled) {
                btn.textContent = "РАБОТАЕТ";
                btn.classList.add('active');
            } else {
                btn.textContent = "ВКЛЮЧИТЬ";
                btn.classList.remove('active');
            }
        });

        function doSpank() {
            const num = Math.floor(Math.random() * CONFIG.totalFiles);
            const file = num.toString().padStart(2, '0') + '.mp3';
            
            const audio = new Audio(CONFIG.path + file);
            audio.volume = 1.0; // Максимальная громкость
            audio.play();

            if ("vibrate" in navigator) {
                navigator.vibrate(70); // Четкая вибрация
            }

            document.body.classList.add('flash');
            setTimeout(() => document.body.classList.remove('flash'), 80);
        }

        window.addEventListener('devicemotion', (event) => {
            if (!isEnabled) return;

            const acc = event.acceleration;
            if (!acc || acc.x === null) return;

            const force = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);

            if (force > CONFIG.threshold) {
                const now = Date.now();
                if (now - lastHit > CONFIG.cooldown) {
                    doSpank();
                    lastHit = now;
                }
            }
        });
    </script>
</body>
</html>

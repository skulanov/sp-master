<body style="background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif;">

    <div style="text-align: center;">
        <h1 style="margin-bottom: 40px;">SPANK MASTER</h1>
        <button id="startBtn" onclick="startApp()" style="
            width: 200px; 
            height: 200px; 
            border-radius: 50%; 
            border: none; 
            background: red; 
            color: white; 
            font-weight: bold; 
            font-size: 1.2rem;
            box-shadow: 0 0 20px rgba(255,0,0,0.4);
            cursor: pointer;
        ">
            ВКЛЮЧИТЬ
        </button>
        <p style="margin-top: 20px; color: #666;">Шлепните по телефону после включения</p>
    </div>

    <!-- Сюда вставьте JavaScript код, который я написал выше -->
    <script>
        // Настройки
const TOTAL_FILES = 60; // Количество файлов от 00 до 59
const BASE_PATH = 'audio/sexy/';
const THRESHOLD = 22;   // Чувствительность акселерометра
const COOLDOWN = 350;    // Пауза между звуками (мс)

let lastHitTime = 0;
let isEnabled = false;

// Функция для получения случайного имени файла (00.mp3 - 59.mp3)
function getRandomFileName() {
    const randomIndex = Math.floor(Math.random() * TOTAL_FILES);
    // Превращаем число (например, 5) в строку "05"
    const formattedNumber = randomIndex.toString().padStart(2, '0');
    return `${formattedNumber}.mp3`;
}

function playSpank() {
    if (!isEnabled) return;

    const fileName = getRandomFileName();
    const audioPath = BASE_PATH + fileName;
    
    const audio = new Audio(audioPath);
    
    // Воспроизведение
    audio.play().catch(e => console.log("Нажмите на экран, чтобы разрешить звук"));

    // Вибрация (идеально для S23 Ultra)
    if ("vibrate" in navigator) {
        navigator.vibrate(60); 
    }

    // Визуальный эффект (вспышка)
    document.body.style.backgroundColor = '#330000';
    setTimeout(() => document.body.style.backgroundColor = '#000', 100);
}

// Слушатель движения
window.addEventListener('devicemotion', (event) => {
    const acc = event.acceleration;
    if (!acc || !isEnabled) return;

    const force = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);

    if (force > THRESHOLD) {
        const now = Date.now();
        if (now - lastHitTime > COOLDOWN) {
            playSpank();
            lastHitTime = now;
        }
    }
});

// Функция для активации (нужна кнопка в HTML)
function startApp() {
    isEnabled = !isEnabled;
    const btn = document.getElementById('startBtn');
    
    if (isEnabled) {
        btn.textContent = "ВЫКЛЮЧИТЬ";
        btn.style.background = "#444";
        // Проигрываем пустой звук для разблокировки аудио-контекста
        new Audio().play().catch(() => {});
    } else {
        btn.textContent = "ВКЛЮЧИТЬ";
        btn.style.background = "red";
    }
}
    </script>
</body>
